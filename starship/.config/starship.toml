######################
# Catppuccin Mocha  #
######################
# Floating Pills for Tools & Time

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](fg:#1e1e2e)\
$os\
[](bg:#313244 fg:#1e1e2e)\
$directory\
$git_branch\
$git_status\
[](fg:#313244)\
$c\
$cmake\
$rust\
$golang\
$nodejs\
$php\
$python\
$java\
$kotlin\
$lua\
$ruby\
$zig\
$docker_context\
$kubernetes\
$terraform\
$cmd_duration\
$jobs\
$status\
\n$character"""

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
bg_dark   = '#1e1e2e'
bg        = '#1e1e2e'
bg_light  = '#313244'
bg_visual = '#45475a'
fg        = '#cdd6f4'
fg_dim    = '#6c7086'
fg_reverse = '#1e1e2e'
red       = '#f38ba8'
orange    = '#fab387'
yellow    = '#f9e2af'
green     = '#a6e3a1'
cyan      = '#89dceb'
blue      = '#89b4fa'
violet    = '#cba6f7'
magenta   = '#f5c2e7'

[os]
disabled = false
style = "bg:#1e1e2e fg:#fab387"
format = "[$symbol](bg:#1e1e2e fg:#fab387)"

[os.symbols]
Alpine = " "
Amazon = " "
Android = " "
Arch = "󰣇 "
Artix = "󰣇 "
CentOS = " "
Debian = "󰣚 "
Fedora = "󰣛 "
Gentoo = "󰣨 "
Linux = "󰌽 "
Macos = " "
Manjaro = " "
Mint = "󰣭 "
NixOS = " "
Raspbian = "󰐿 "
Redhat = "󱄛 "
RedHatEnterprise = "󱄛 "
SUSE = " "
Ubuntu = "󰕈 "
Unknown = " "
Windows = "󰍲 "

[username]
show_always = true
style_user = "bg:#1e1e2e fg:#a6e3a1"
style_root = "bg:#1e1e2e fg:#f38ba8 bold"
format = '[$user ](bg:#1e1e2e $style)'

[directory]
style = "fg:#cdd6f4 bg:#313244 bold"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "…/"
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "fg:#f38ba8 bg:#313244"

[directory.substitutions]
"/home/yeshua" = "󰇴"
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Videos" = " "
"Developer" = "󰲋 "
"Projects" = "󰉖 "
".config" = " "
"Desktop" = "󰚝 "

[git_branch]
symbol = " "
style = "bg:#313244 fg:#cba6f7 bold"
format = '[$symbol$branch ]($style)'
truncation_length = 20
truncation_symbol = "…"

[git_status]
style = "bg:#313244 fg:#fab387"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "󰞇"
ahead = "󰜷${count}"
behind = "󰜮${count}"
diverged = "󰃻${ahead_count}󰃻${behind_count}"
untracked = "?"
stashed = "󰜦"
modified = "󱇨"
staged = "󰄬${count}"
renamed = "󰑕"
deleted = "󰍵"

# --- ESTILO DE BURBUJAS (FLOATING PILLS) ---
# Usamos un fondo #45475a (bg_visual) para que resalten sobre la terminal

[c]
symbol = " "
format = ' [](fg:#45475a)[ $symbol($version) ](bg:#45475a fg:#fab387)[](fg:#45475a)'

[cmake]
symbol = "△ "
format = ' [](fg:#45475a)[ $symbol($version) ](bg:#45475a fg:#fab387)[](fg:#45475a)'

[rust]
symbol = " "
format = ' [](fg:#45475a)[ $symbol($version) ](bg:#45475a fg:#fab387)[](fg:#45475a)'

[golang]
symbol = " "
format = ' [](fg:#45475a)[ $symbol($version) ](bg:#45475a fg:#fab387)[](fg:#45475a)'

[nodejs]
symbol = " "
format = ' [](fg:#45475a)[ $symbol($version) ](bg:#45475a fg:#a6e3a1)[](fg:#45475a)'

[php]
symbol = " "
format = ' [](fg:#45475a)[ $symbol($version) ](bg:#45475a fg:#cba6f7)[](fg:#45475a)'

# --- PYTHON CONFIGURADO CON VENV ---
[python]
symbol = " "
# Aquí agregué (\($virtualenv\)) para que muestre el nombre del entorno
format = ' [](fg:#45475a)[ $symbol$version( \($virtualenv\)) ](bg:#45475a fg:#fab387)[](fg:#45475a)'
detect_extensions = ['py']
detect_files = ['.python-version', 'Pipfile', '__pycache__', 'pyproject.toml', 'requirements.txt', 'setup.py', 'tox.ini']

[java]
symbol = " "
format = ' [](fg:#45475a)[ $symbol($version) ](bg:#45475a fg:#f38ba8)[](fg:#45475a)'

[kotlin]
symbol = " "
format = ' [](fg:#45475a)[ $symbol($version) ](bg:#45475a fg:#cba6f7)[](fg:#45475a)'

[lua]
symbol = " "
format = ' [](fg:#45475a)[ $symbol($version) ](bg:#45475a fg:#a6e3a1)[](fg:#45475a)'

[ruby]
symbol = " "
format = ' [](fg:#45475a)[ $symbol($version) ](bg:#45475a fg:#f38ba8)[](fg:#45475a)'

[zig]
symbol = " "
format = ' [](fg:#45475a)[ $symbol($version) ](bg:#45475a fg:#fab387)[](fg:#45475a)'

[docker_context]
symbol = " "
format = ' [](fg:#45475a)[ $symbol$context ](bg:#45475a fg:#a6e3a1)[](fg:#45475a)'
only_with_files = true

[kubernetes]
symbol = "󱃾 "
format = ' [](fg:#45475a)[ $symbol$context( \($namespace\)) ](bg:#45475a fg:#fab387)[](fg:#45475a)'
disabled = false

[terraform]
symbol = "󱁢 "
format = ' [](fg:#45475a)[ $symbol$workspace ](bg:#45475a fg:#cba6f7)[](fg:#45475a)'

# --- TIEMPO DE COMANDO (CMD DURATION) ---
[cmd_duration]
min_time = 500
# Fondo gris azulado, texto amarillo, bordes redondos
format = " [](fg:#45475a)[ 󱦟 $duration ](bg:#45475a fg:#fab387)[](fg:#45475a)"
show_milliseconds = false

[jobs]
symbol = " "
number_threshold = 1
format = " [](fg:#45475a)[ $symbol$number ](bg:#45475a fg:#a6e3a1)[](fg:#45475a)"

[status]
disabled = false
format = ' [](fg:#45475a)[ $symbol$status ](bg:#45475a fg:#f38ba8 bold)[](fg:#45475a)'
symbol = "✗ "
success_symbol = ""
not_executable_symbol = "󰌋 "
not_found_symbol = "󰍉 "
sigint_symbol = "󰂭 "
signal_symbol = "󱐋 "

[line_break]
disabled = false

[character]
disabled = false
success_symbol = "[❯](bold fg:#a6e3a1)"
error_symbol = "[❯](bold fg:#f38ba8)"
vimcmd_symbol = "[❮](bold fg:#a6e3a1)"
vimcmd_visual_symbol = "[❮](bold fg:#cba6f7)"
vimcmd_replace_symbol = "[❮](bold fg:#fab387)"
vimcmd_replace_one_symbol = "[❮](bold fg:#fab387)"
