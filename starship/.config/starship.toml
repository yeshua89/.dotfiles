######################
# Catppuccin Mocha  #
######################
# Floating Pills for Tools & Time

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](fg:#282a36)\
$os\
[](bg:#44475a fg:#282a36)\
$directory\
$git_branch\
$git_status\
[](fg:#44475a)\
$c\
$cmake\
$rust\
$golang\
$nodejs\
$php\
$python\
$java\
$kotlin\
$lua\
$ruby\
$zig\
$docker_context\
$kubernetes\
$terraform\
$cmd_duration\
$jobs\
$status\
\n$character"""

palette = 'dracula'

[palettes.dracula]
bg_dark   = '#282a36'
bg        = '#282a36'
bg_light  = '#44475a'
bg_visual = '#6272a4'
fg        = '#f8f8f2'
fg_dim    = '#6272a4'
fg_reverse = '#282a36'
red       = '#ff5555'
orange    = '#ffb86c'
yellow    = '#f1fa8c'
green     = '#50fa7b'
cyan      = '#8be9fd'
blue      = '#6272a4'
violet    = '#bd93f9'
magenta   = '#ff79c6'

[os]
disabled = false
style = "bg:#282a36 fg:#ffb86c"
format = "[$symbol](bg:#282a36 fg:#ffb86c)"

[os.symbols]
Alpine = " "
Amazon = " "
Android = " "
Arch = "󰣇 "
Artix = "󰣇 "
CentOS = " "
Debian = "󰣚 "
Fedora = "󰣛 "
Gentoo = "󰣨 "
Linux = "󰌽 "
Macos = " "
Manjaro = " "
Mint = "󰣭 "
NixOS = " "
Raspbian = "󰐿 "
Redhat = "󱄛 "
RedHatEnterprise = "󱄛 "
SUSE = " "
Ubuntu = "󰕈 "
Unknown = " "
Windows = "󰍲 "

[username]
show_always = true
style_user = "bg:#282a36 fg:#50fa7b"
style_root = "bg:#282a36 fg:#ff5555 bold"
format = '[$user ](bg:#282a36 $style)'

[directory]
style = "fg:#f8f8f2 bg:#44475a bold"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "…/"
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "fg:#ff5555 bg:#44475a"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Videos" = " "
"Developer" = "󰲋 "
"Projects" = "󰉖 "
".config" = " "
"Desktop" = "󰚝 "

[git_branch]
symbol = " "
style = "bg:#44475a fg:#bd93f9 bold"
format = '[$symbol$branch ]($style)'
truncation_length = 20
truncation_symbol = "…"

[git_status]
style = "bg:#44475a fg:#ffb86c"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "󰞇"
ahead = "󰜷${count}"
behind = "󰜮${count}"
diverged = "󰃻${ahead_count}󰃻${behind_count}"
untracked = "?"
stashed = "󰜦"
modified = "󱇨"
staged = "󰄬${count}"
renamed = "󰑕"
deleted = "󰍵"

# --- ESTILO DE BURBUJAS (FLOATING PILLS) ---
# Usamos un fondo #6272a4 (bg_visual) para que resalten sobre la terminal

[c]
symbol = " "
format = ' [](fg:#6272a4)[ $symbol($version) ](bg:#6272a4 fg:#ffb86c)[](fg:#6272a4)'

[cmake]
symbol = "△ "
format = ' [](fg:#6272a4)[ $symbol($version) ](bg:#6272a4 fg:#ffb86c)[](fg:#6272a4)'

[rust]
symbol = " "
format = ' [](fg:#6272a4)[ $symbol($version) ](bg:#6272a4 fg:#ffb86c)[](fg:#6272a4)'

[golang]
symbol = " "
format = ' [](fg:#6272a4)[ $symbol($version) ](bg:#6272a4 fg:#ffb86c)[](fg:#6272a4)'

[nodejs]
symbol = " "
format = ' [](fg:#6272a4)[ $symbol($version) ](bg:#6272a4 fg:#50fa7b)[](fg:#6272a4)'

[php]
symbol = " "
format = ' [](fg:#6272a4)[ $symbol($version) ](bg:#6272a4 fg:#bd93f9)[](fg:#6272a4)'

# --- PYTHON CONFIGURADO CON VENV ---
[python]
symbol = " "
# Aquí agregué (\($virtualenv\)) para que muestre el nombre del entorno
format = ' [](fg:#6272a4)[ $symbol$version( \($virtualenv\)) ](bg:#6272a4 fg:#ffb86c)[](fg:#6272a4)'
detect_extensions = ['py']
detect_files = ['.python-version', 'Pipfile', '__pycache__', 'pyproject.toml', 'requirements.txt', 'setup.py', 'tox.ini']

[java]
symbol = " "
format = ' [](fg:#6272a4)[ $symbol($version) ](bg:#6272a4 fg:#ff5555)[](fg:#6272a4)'

[kotlin]
symbol = " "
format = ' [](fg:#6272a4)[ $symbol($version) ](bg:#6272a4 fg:#bd93f9)[](fg:#6272a4)'

[lua]
symbol = " "
format = ' [](fg:#6272a4)[ $symbol($version) ](bg:#6272a4 fg:#50fa7b)[](fg:#6272a4)'

[ruby]
symbol = " "
format = ' [](fg:#6272a4)[ $symbol($version) ](bg:#6272a4 fg:#ff5555)[](fg:#6272a4)'

[zig]
symbol = " "
format = ' [](fg:#6272a4)[ $symbol($version) ](bg:#6272a4 fg:#ffb86c)[](fg:#6272a4)'

[docker_context]
symbol = " "
format = ' [](fg:#6272a4)[ $symbol$context ](bg:#6272a4 fg:#50fa7b)[](fg:#6272a4)'
only_with_files = true

[kubernetes]
symbol = "󱃾 "
format = ' [](fg:#6272a4)[ $symbol$context( \($namespace\)) ](bg:#6272a4 fg:#ffb86c)[](fg:#6272a4)'
disabled = false

[terraform]
symbol = "󱁢 "
format = ' [](fg:#6272a4)[ $symbol$workspace ](bg:#6272a4 fg:#bd93f9)[](fg:#6272a4)'

# --- TIEMPO DE COMANDO (CMD DURATION) ---
[cmd_duration]
min_time = 500
# Fondo gris azulado, texto amarillo, bordes redondos
format = " [](fg:#6272a4)[ 󱦟 $duration ](bg:#6272a4 fg:#ffb86c)[](fg:#6272a4)"
show_milliseconds = false

[jobs]
symbol = " "
number_threshold = 1
format = " [](fg:#6272a4)[ $symbol$number ](bg:#6272a4 fg:#50fa7b)[](fg:#6272a4)"

[status]
disabled = false
format = ' [](fg:#6272a4)[ $symbol$status ](bg:#6272a4 fg:#ff5555 bold)[](fg:#6272a4)'
symbol = "✗ "
success_symbol = ""
not_executable_symbol = "󰌋 "
not_found_symbol = "󰍉 "
sigint_symbol = "󰂭 "
signal_symbol = "󱐋 "

[line_break]
disabled = false

[character]
disabled = false
success_symbol = "[❯](bold fg:#50fa7b)"
error_symbol = "[❯](bold fg:#ff5555)"
vimcmd_symbol = "[❮](bold fg:#50fa7b)"
vimcmd_visual_symbol = "[❮](bold fg:#bd93f9)"
vimcmd_replace_symbol = "[❮](bold fg:#ffb86c)"
vimcmd_replace_one_symbol = "[❮](bold fg:#ffb86c)"
