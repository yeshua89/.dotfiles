######################
# Catppuccin Mocha  #
######################
# Floating Pills for Tools & Time

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](fg:#191724)\
$os\
[](bg:#26233a fg:#191724)\
$directory\
$git_branch\
$git_status\
[](fg:#26233a)\
$c\
$cmake\
$rust\
$golang\
$nodejs\
$php\
$python\
$java\
$kotlin\
$lua\
$ruby\
$zig\
$docker_context\
$kubernetes\
$terraform\
$cmd_duration\
$jobs\
$status\
\n$character"""

palette = 'rose_pine'

[palettes.rose_pine]
bg_dark   = '#191724'
bg        = '#191724'
bg_light  = '#26233a'
bg_visual = '#403d52'
fg        = '#e0def4'
fg_dim    = '#6e6a86'
fg_reverse = '#191724'
red       = '#eb6f92'
orange    = '#f6c177'
yellow    = '#f6c177'
green     = '#9ccfd8'
cyan      = '#ebbcba'
blue      = '#9ccfd8'
violet    = '#c4a7e7'
magenta   = '#c4a7e7'

[os]
disabled = false
style = "bg:#191724 fg:#f6c177"
format = "[$symbol](bg:#191724 fg:#f6c177)"

[os.symbols]
Alpine = " "
Amazon = " "
Android = " "
Arch = "󰣇 "
Artix = "󰣇 "
CentOS = " "
Debian = "󰣚 "
Fedora = "󰣛 "
Gentoo = "󰣨 "
Linux = "󰌽 "
Macos = " "
Manjaro = " "
Mint = "󰣭 "
NixOS = " "
Raspbian = "󰐿 "
Redhat = "󱄛 "
RedHatEnterprise = "󱄛 "
SUSE = " "
Ubuntu = "󰕈 "
Unknown = " "
Windows = "󰍲 "

[username]
show_always = true
style_user = "bg:#191724 fg:#9ccfd8"
style_root = "bg:#191724 fg:#eb6f92 bold"
format = '[$user ](bg:#191724 $style)'

[directory]
style = "fg:#e0def4 bg:#26233a bold"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "…/"
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "fg:#eb6f92 bg:#26233a"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Videos" = " "
"Developer" = "󰲋 "
"Projects" = "󰉖 "
".config" = " "
"Desktop" = "󰚝 "

[git_branch]
symbol = " "
style = "bg:#26233a fg:#c4a7e7 bold"
format = '[$symbol$branch ]($style)'
truncation_length = 20
truncation_symbol = "…"

[git_status]
style = "bg:#26233a fg:#f6c177"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "󰞇"
ahead = "󰜷${count}"
behind = "󰜮${count}"
diverged = "󰃻${ahead_count}󰃻${behind_count}"
untracked = "?"
stashed = "󰜦"
modified = "󱇨"
staged = "󰄬${count}"
renamed = "󰑕"
deleted = "󰍵"

# --- ESTILO DE BURBUJAS (FLOATING PILLS) ---
# Usamos un fondo #403d52 (bg_visual) para que resalten sobre la terminal

[c]
symbol = " "
format = ' [](fg:#403d52)[ $symbol($version) ](bg:#403d52 fg:#f6c177)[](fg:#403d52)'

[cmake]
symbol = "△ "
format = ' [](fg:#403d52)[ $symbol($version) ](bg:#403d52 fg:#f6c177)[](fg:#403d52)'

[rust]
symbol = " "
format = ' [](fg:#403d52)[ $symbol($version) ](bg:#403d52 fg:#f6c177)[](fg:#403d52)'

[golang]
symbol = " "
format = ' [](fg:#403d52)[ $symbol($version) ](bg:#403d52 fg:#f6c177)[](fg:#403d52)'

[nodejs]
symbol = " "
format = ' [](fg:#403d52)[ $symbol($version) ](bg:#403d52 fg:#9ccfd8)[](fg:#403d52)'

[php]
symbol = " "
format = ' [](fg:#403d52)[ $symbol($version) ](bg:#403d52 fg:#c4a7e7)[](fg:#403d52)'

# --- PYTHON CONFIGURADO CON VENV ---
[python]
symbol = " "
# Aquí agregué (\($virtualenv\)) para que muestre el nombre del entorno
format = ' [](fg:#403d52)[ $symbol$version( \($virtualenv\)) ](bg:#403d52 fg:#f6c177)[](fg:#403d52)'
detect_extensions = ['py']
detect_files = ['.python-version', 'Pipfile', '__pycache__', 'pyproject.toml', 'requirements.txt', 'setup.py', 'tox.ini']

[java]
symbol = " "
format = ' [](fg:#403d52)[ $symbol($version) ](bg:#403d52 fg:#eb6f92)[](fg:#403d52)'

[kotlin]
symbol = " "
format = ' [](fg:#403d52)[ $symbol($version) ](bg:#403d52 fg:#c4a7e7)[](fg:#403d52)'

[lua]
symbol = " "
format = ' [](fg:#403d52)[ $symbol($version) ](bg:#403d52 fg:#9ccfd8)[](fg:#403d52)'

[ruby]
symbol = " "
format = ' [](fg:#403d52)[ $symbol($version) ](bg:#403d52 fg:#eb6f92)[](fg:#403d52)'

[zig]
symbol = " "
format = ' [](fg:#403d52)[ $symbol($version) ](bg:#403d52 fg:#f6c177)[](fg:#403d52)'

[docker_context]
symbol = " "
format = ' [](fg:#403d52)[ $symbol$context ](bg:#403d52 fg:#9ccfd8)[](fg:#403d52)'
only_with_files = true

[kubernetes]
symbol = "󱃾 "
format = ' [](fg:#403d52)[ $symbol$context( \($namespace\)) ](bg:#403d52 fg:#f6c177)[](fg:#403d52)'
disabled = false

[terraform]
symbol = "󱁢 "
format = ' [](fg:#403d52)[ $symbol$workspace ](bg:#403d52 fg:#c4a7e7)[](fg:#403d52)'

# --- TIEMPO DE COMANDO (CMD DURATION) ---
[cmd_duration]
min_time = 500
# Fondo gris azulado, texto amarillo, bordes redondos
format = " [](fg:#403d52)[ 󱦟 $duration ](bg:#403d52 fg:#f6c177)[](fg:#403d52)"
show_milliseconds = false

[jobs]
symbol = " "
number_threshold = 1
format = " [](fg:#403d52)[ $symbol$number ](bg:#403d52 fg:#9ccfd8)[](fg:#403d52)"

[status]
disabled = false
format = ' [](fg:#403d52)[ $symbol$status ](bg:#403d52 fg:#eb6f92 bold)[](fg:#403d52)'
symbol = "✗ "
success_symbol = ""
not_executable_symbol = "󰌋 "
not_found_symbol = "󰍉 "
sigint_symbol = "󰂭 "
signal_symbol = "󱐋 "

[line_break]
disabled = false

[character]
disabled = false
success_symbol = "[❯](bold fg:#9ccfd8)"
error_symbol = "[❯](bold fg:#eb6f92)"
vimcmd_symbol = "[❮](bold fg:#9ccfd8)"
vimcmd_visual_symbol = "[❮](bold fg:#c4a7e7)"
vimcmd_replace_symbol = "[❮](bold fg:#f6c177)"
vimcmd_replace_one_symbol = "[❮](bold fg:#f6c177)"
