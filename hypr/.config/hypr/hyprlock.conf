background {
    path = /home/shaddai/Backgrounds/dune2.jpg
    blur_passes = 2
    opacity = 0.8
    color = rgba(26,27,38,1.0)
}

input-field {
    size = 22%, 6%
    outline_thickness = 2
    inner_color = rgba(26,27,38,0.7)
    outer_color = rgba(122,162,247,0.5) rgba(187,154,247,0.5) 45deg
    check_color = rgba(125,207,255,0.5) rgba(158,206,106,0.5) 120deg
    fail_color = rgba(247,118,142,0.5) rgba(187,154,247,0.5) 40deg
    font_color = rgba(192,202,245,1.0)
    fade_on_empty = false
    rounding = 20
    position = 0, -80
    halign = center
    valign = center
    placeholder_text = "Enter password…"
    placeholder_color = rgba(65,72,104,0.8)
    font_family = "JetBrainsMono Nerd Font"
    fail_color = rgba(247,118,142,1.0)
    fail_text = "<i><span foreground='red'>  Error </span></i>"
    fail_transition = 300
}

label {
    text = "$TIME12"
    font_size = 64
    color = rgba(192,202,245,1.0)
    font_family = "JetBrainsMono Nerd Font"
    position = 0, 60
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] date "+%Y-%m-%d"
    font_size = 24
    color = rgba(125,207,255,1.0)
    font_family = "JetBrainsMono Nerd Font"
    position = 0, 120
    halign = center
    valign = center
}

label {
    text = "Welcome Shaddai"
    font_size = 22
    color = rgba(187,154,247,1.0)
    font_family = "JetBrainsMono Nerd Font"
    position = 0, 180
    halign = center
    valign = center
}
