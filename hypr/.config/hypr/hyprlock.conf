background {
    path = /home/shaddai/Backgrounds/dune2.jpg
    blur_passes = 2
    opacity = 0.8
    color = rgba(14,14,22,1.0)
}

input-field {
    size = 22%, 6%
    outline_thickness = 2
    inner_color = rgba(14,14,22,0.7)
    outer_color = rgba(201,160,64,0.5) rgba(152,120,200,0.5) 45deg
    check_color = rgba(122,171,138,0.5) rgba(122,170,184,0.5) 120deg
    fail_color = rgba(208,96,128,0.5) rgba(152,120,200,0.5) 40deg
    font_color = rgba(232,226,248,1.0)
    fade_on_empty = false
    rounding = 20
    position = 0, -80
    halign = center
    valign = center
    placeholder_text = "Enter password…"
    placeholder_color = rgba(74,74,106,0.8)
    font_family = "JetBrainsMono Nerd Font"
    fail_color = rgba(208,96,128,1.0)
    fail_text = "<i><span foreground='red'>  Error </span></i>"
    fail_transition = 300
}

label {
    text = "$TIME12"
    font_size = 64
    color = rgba(201,160,64,1.0)
    font_family = "JetBrainsMono Nerd Font"
    position = 0, 60
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] date "+%Y-%m-%d"
    font_size = 24
    color = rgba(122,170,184,1.0)
    font_family = "JetBrainsMono Nerd Font"
    position = 0, 120
    halign = center
    valign = center
}

label {
    text = "Welcome Shaddai"
    font_size = 22
    color = rgba(152,120,200,1.0)
    font_family = "JetBrainsMono Nerd Font"
    position = 0, 180
    halign = center
    valign = center
}
