# ============================================================
# MangoWM config
# Docs: https://mangowm.github.io/docs
# ============================================================

# --- Monitor ---
monitorrule=name:^eDP-1$,width:1920,height:1080,refresh:60,x:0,y:0,scale:1

# --- Autostart ---
exec-once=waybar --config ~/.config/waybar-mango/config.jsonc --style ~/.config/waybar-mango/style.css
exec-once=swaybg -i ~/Backgrounds/dune.jpg -m fill
exec-once=swaync
exec-once=hypridle
exec-once=hyprsunset
exec-once=wl-paste --type text --watch cliphist store
exec-once=wl-paste --type image --watch cliphist store
exec-once=mkdir -p ~/Screenshots

# --- Variables de entorno ---
env=XCURSOR_SIZE,24
env=XDG_SESSION_TYPE,wayland
env=XDG_CURRENT_DESKTOP,mango
env=MOZ_ENABLE_WAYLAND,1
env=QT_QPA_PLATFORM,wayland
env=QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env=GDK_BACKEND,wayland,x11
env=SDL_VIDEODRIVER,wayland
env=CLUTTER_BACKEND,wayland
env=ELECTRON_OZONE_PLATFORM_HINT,wayland

# --- Input / Teclado ---
xkb_rules_layout=us
repeat_rate=25
repeat_delay=300

# --- Scratchpad ---
scratchpad_width_ratio=0.85
scratchpad_height_ratio=0.6
windowrule=isnamedscratchpad:1,width:1600,height:650,appid:scratchpad

# --- Apariencia ---
border_radius=10
no_radius_when_single=1
new_is_master=0
borderpx=2
focuscolor=0x9b59b6ff
bordercolor=0x4a2060ff
urgentcolor=0xe74c3cff
gappih=6
gappiv=6
gappoh=8
gappov=8

# --- Opacidad ---
unfocused_opacity=0.92

# --- Sombras (solo en flotantes) ---
shadows=1
shadow_only_floating=1
shadows_size=10
shadows_blur=15
shadows_position_x=0
shadows_position_y=2
shadowscolor=0x00000055

# --- Animaciones ---
animations=1
layer_animations=1
animation_type_open=fade
animation_type_close=fade
layer_animation_type_open=fade
layer_animation_type_close=fade
animation_fade_in=1
animation_fade_out=1
fadein_begin_opacity=0.0
fadeout_begin_opacity=1.0
animation_duration_open=180
animation_duration_close=120
animation_duration_move=200
animation_duration_tag=200
animation_duration_focus=0

# --- Trackpad ---
tap_to_click=1
tap_and_drag=1
trackpad_natural_scrolling=1
disable_while_typing=1
drag_lock=0
click_method=1

# ============================================================
# KEYBINDINGS
# Sintaxis: bind=MODIFIERS,key,action,args
# Modificadores: SUPER, ALT, CTRL, SHIFT, NONE (combinar con +)
# ============================================================

# --- Sistema ---
bind=SUPER+SHIFT,l,spawn,swaylock

# --- Scratchpad terminal ---
bind=NONE,F12,toggle_named_scratchpad,scratchpad,none,kitty --class scratchpad

# --- Aplicaciones ---
bind=SUPER,Return,spawn,kitty
bind=SUPER,d,spawn,fuzzel
bind=SUPER,e,spawn,qutebrowser
bind=SUPER,c,spawn,bash -c "cliphist list | fuzzel --dmenu | cliphist decode | wl-copy"
bind=SUPER,n,spawn,swaync-client -t -sw

# --- Layouts ---
bind=SUPER,Tab,spawn,bash ~/.config/mango/switch-layout.sh

# --- Gestión de ventanas ---
bind=SUPER,q,killclient
bind=SUPER,v,togglefloating,
bind=SUPER,f,togglefullscreen,
bind=SUPER,z,zoom,
bind=SUPER+SHIFT,s,spawn,bash ~/.config/mango/show-from-pool.sh
bind=SUPER,s,minimized,
bind=SUPER+SHIFT,q,quit
bind=SUPER,r,reload_config

# --- Foco ---
bind=SUPER,left,focusdir,left
bind=SUPER,right,focusdir,right
bind=SUPER,up,focusdir,up
bind=SUPER,down,focusdir,down
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right
bind=SUPER,grave,focuslast,

# --- Mover ventanas (swap) ---
bind=SUPER+SHIFT,left,exchange_client,left
bind=SUPER+SHIFT,right,exchange_client,right
bind=SUPER+SHIFT,up,exchange_client,up
bind=SUPER+SHIFT,down,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right

# --- Master / Stack ---
bind=SUPER+ALT,h,setmfact,-0.05
bind=SUPER+ALT,l,setmfact,+0.05
bind=SUPER+ALT,j,incnmaster,-1
bind=SUPER+ALT,k,incnmaster,+1

# --- Redimensionar ---
bind=SUPER+CTRL,left,resizewin,-40,+0
bind=SUPER+CTRL,right,resizewin,+40,+0
bind=SUPER+CTRL,up,resizewin,+0,-40
bind=SUPER+CTRL,down,resizewin,+0,+40
bind=SUPER+CTRL,h,resizewin,-40,+0
bind=SUPER+CTRL,l,resizewin,+40,+0
bind=SUPER+CTRL,k,resizewin,+0,-40
bind=SUPER+CTRL,j,resizewin,+0,+40

# --- Tags (view=cambiar, tag=mover ventana) ---
bind=SUPER,comma,viewtoleft,
bind=SUPER,period,viewtoright,
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# --- Screenshots con grim+slurp ---
bind=NONE,PRINT,spawn,bash -c "f=~/Screenshots/$(date +%Y%m%d_%H%M%S).png; grim \"$f\" && notify-send -i camera 'Screenshot' \"Guardado: $f\""
bind=SHIFT,PRINT,spawn,bash -c "grim -g \"$(slurp)\" - | tee ~/Screenshots/$(date +%Y%m%d_%H%M%S)_sel.png | wl-copy && notify-send -i camera 'Screenshot' 'Selección copiada al portapapeles'"

# --- Multimedia ---
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl s 10%+
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl s 10%-
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioPause,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous

# --- Mouse ---
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
