selection-match=00d4ffff
border=00d4ff88
prompt=00d4ffff
placeholder=505050ff
input=e2e2e2ff
match=00d4ffff
counter=5588ccff

[border]
width=2
radius=12

[dmenu]
exit-immediately-if-empty=no           
