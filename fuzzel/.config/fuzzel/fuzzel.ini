[main]
font=FiraCode Nerd Font:size=11
icon-theme=Mojave-CT-Black
show-actions=yes
terminal=kitty
width=40
horizontal-pad=20
vertical-pad=12
inner-pad=8
line-height=20
lines=1
prompt=" ❯ "
placeholder=Buscar aplicaciones...
dpi-aware=yes
layer=overlay
